<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- Defense-in-depth: the host already blocks remote loads for panels without
     the network permission; this pins the page itself to inline assets. -->
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src https:">
<style>
  /* Ink & Phosphor tokens (DESIGN.md). Iosevka applies when installed;
     otherwise the documented SF fallback. Hairlines structure, green signals. */
  :root {
    color-scheme: light dark;
    --bg: #FAFBFA; --text: #16181A; --muted: #6E766F;
    --chrome: #F1F3F1; --hairline: #D8DCD6; --accent: #157A46;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161A16; --text: #E4E6E3; --muted: #7C8A7E;
      --chrome: #1E221E; --hairline: #353A35; --accent: #3FE28A;
    }
  }
  body {
    font: 13px/1.55 "Iosevka Aile", -apple-system, "SF Pro Text", sans-serif;
    margin: 0;
    padding: 12px 16px 24px;
    color: var(--text);
    background: var(--bg);
    word-wrap: break-word;
  }
  h1, h2, h3, h4, h5, h6 { line-height: 1.25; margin: 0.9em 0 0.4em; }
  h1, h2 { border-bottom: 1px solid var(--hairline); padding-bottom: .2em; }
  code, pre { font-family: "Iosevka Term", ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  pre {
    background: var(--chrome);
    border: 1px solid var(--hairline);
    padding: 10px 12px;
    overflow-x: auto;
  }
  code { background: var(--chrome); padding: 1px 4px; }
  pre code { background: none; border: none; padding: 0; }
  blockquote {
    border-left: 1px solid var(--hairline);
    margin: 0.5em 0 0.5em 2px;
    padding: 2px 12px;
    color: var(--muted);
  }
  blockquote p { margin: 0.3em 0; }
  img { max-width: 100%; }
  a { color: var(--accent); }
  hr { border: none; border-top: 1px solid var(--hairline); margin: 1em 0; }
  ul, ol { padding-left: 1.5em; }
  .nc-hint { color: var(--muted); font-style: italic; margin-bottom: 8px; font-size: 11px; }
  .nc-raw { white-space: pre-wrap; }
</style>
</head>
<body>
<div id="content"></div>
<script>
  // Host → panel delivery point (see README, "Panel message protocol").
  window.__noteclarity_receive = function (msg) {
    if (msg && msg.type === "render") {
      document.getElementById("content").innerHTML = msg.html;
    }
  };
  // Tell the plugin host code we can accept messages now.
  window.noteclarity.postMessage({ type: "ready" });
</script>
</body>
</html>
